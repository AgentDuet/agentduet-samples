services:
  medical-pretriage-agent:
    build: .
    image: medical-pretriage-agent:latest
    container_name: medical-pretriage-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      HEALTH_HOST: "0.0.0.0"
      HEALTH_PORT: "8080"
      CLOUDWATCH_ENABLED: "${CLOUDWATCH_ENABLED:-true}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      NOVA_MODEL_ID: "${NOVA_MODEL_ID:-amazon.nova-2-sonic-v1:0}"
    # Prefer an IAM role / instance profile in AWS. Locally, pass keys via .env.
